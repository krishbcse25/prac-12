<html>
<head>
<title>PAN Card Application Form</title>
</head>

<body bgcolor="lightgreen">

<h2 align="lightgreen">PAN Card Application Form</h2>

<form>

<fieldset style="background-color: red;">
<legend>Personal Details</legend>

Full Name:<br>
<input type="text" name="fullname"><br><br>

Father's Name:<br>
<input type="text" name="fathername"><br><br>

Date of Birth:<br>
<input type="date" name="dob"><br><br>

Gender:<br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other
<br><br>

</fieldset>

<br>

<fieldset>
<legend>Contact Details</legend>

Mobile Number:<br>
<input type="tel" name="mobile"><br><br>

Email ID:<br>
<input type="email" name="email"><br><br>

Address:<br>
<textarea></textarea>

</fieldset>

<br>

<fieldset>
<legend>Other Information</legend>

State:<br>
<select name="state">
<option>Select State</option>
<option>Maharashtra</option>
<option>Gujarat</option>
<option>Madhya Pradesh</option>
<option>Delhi</option>
</select>

<br><br>

Documents Submitted:<br>
<input type="checkbox"> Aadhaar Card
<input type="checkbox"> Voter ID
<input type="checkbox"> Passport
<input type="checkbox"> Driving License

</fieldset>

<br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</body>
</html>
