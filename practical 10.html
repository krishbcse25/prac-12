
<html>
<head>
    
    <title>Iframe Webpage Demo</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: flex;
            height: 90vh;
        }

        .menu {
            width: 20%;
            background: #34495e;
            padding: 20px;
            box-sizing: border-box;
        }

        .menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin-bottom: 10px;
            background: #3d566e;
            border-radius: 5px;
            transition: 0.3s;
        }

        .menu a:hover {
            background: #1abc9c;
        }

        .content {
            width: 80%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

<header>
    <h2>Iframe & Map Embedding Webpage</h2>
    <p> BY KRISH BORKAR </p>
    <p> USN: CS25150</p>
</header>

<div class="container">

    <!-- Navigation Menu -->
    <div class="menu">
        <a href="https://www.wikipedia.org" target="frame">Open Wikipedia</a>
        <a href="https://www.example.com" target="frame">Open Example Site</a>
        
        <!-- Map Embed Button -->
        <a href="https://maps.google.com/maps?q=Nagpur&t=&z=13&ie=UTF8&iwloc=&output=embed" target="frame">
            Show Nagpur Map
        </a>

        <!-- Local HTML Content -->
        <a hrefdoc="<h1 style='text-align:center;'>Welcome!</h1><p style='text-align:center;'>This is internal content loaded in iframe.</p>" target="frame">
            Show Internal Content
        </a>
    </div>

    <!-- Iframe Display Area -->
    <div class="content">
        <iframe name="frame" src="https://www.example.com"></iframe>
    </div>

</div>

</body>
</html>
