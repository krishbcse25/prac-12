
<html>
<head>
        <title>Responsive CSS3 Webpage</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f4f4;
        }

        /* Header */
        header {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
            padding: 30px;
            animation: fadeIn 2s ease-in;
        }

        /* Navigation */
        nav {
            background: #333;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            display: inline-block;
            transition: 0.3s;
        }

        nav a:hover {
            background: #00c6ff;
            transform: scale(1.1);
        }

        /* Container */
        .container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            padding: 20px;
        }

        /* Cards (Columns) */
        .card {
            background: white;
            width: 300px;
            margin: 15px;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            transition: transform 0.4s;
        }

        /* Transformations */
        .card:hover {
            transform: translateY(-10px) rotate(2deg);
        }

        /* Icons */
        .icon {
            font-size: 40px;
            color: #00c6ff;
            margin-bottom: 10px;
        }

        /* Footer */
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Responsive Webpage</h1>
        <p>Using CSS3 Features</p>
        <p> By KRISH BORKAR</p>
        <p> USN - CS25150 </p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <section class="container">

        <div class="card">
            <i class="fas fa-laptop-code icon"></i>
            <h2>Web Design</h2>
            <p>Modern design using HTML & CSS.</p>
        </div>

        <div class="card">
            <i class="fas fa-mobile-alt icon"></i>
            <h2>Responsive</h2>
            <p>Works on mobile, tablet & desktop.</p>
        </div>

        <div class="card">
            <i class="fas fa-rocket icon"></i>
            <h2>Performance</h2>
            <p>Smooth animations and fast UI.</p>
        </div>

    </section>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
